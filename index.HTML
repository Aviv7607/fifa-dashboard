<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>FIFA LAFFA - ליגה</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; }
        .card { background: #1e293b; margin: 20px auto; padding: 20px; border-radius: 15px; max-width: 800px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border-bottom: 1px solid #334155; }
        th { color: #00ff88; }
        .podium { display: flex; justify-content: center; align-items: flex-end; gap: 10px; height: 150px; margin: 20px; }
        .p-item { background: #00ff88; color: #0f172a; padding: 10px; border-radius: 5px 5px 0 0; font-weight: bold; }
    </style>
</head>
<body>
    <h1>⚽ FIFA LAFFA 🥙</h1>
    <div id="content" class="card">טוען נתונים מהאקסל...</div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxO1HqJ4OnS8xKGcsNzr6rFcJ8Q0KlfaGczBJUmP8Gda3iF0X_LTjFFuXoqGiJr0xgq/exec';
        
        async function getData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                render(data.players);
            } catch (e) {
                document.getElementById('content').innerHTML = "שגיאה בטעינה. וודא שהסקריפט מפורסם כ-Anyone.";
            }
        }

        function render(players) {
            // מיון לפי אחוז ניצחונות
            players.sort((a, b) => b.winRate - a.winRate);
            
            let html = `<table>
                <tr><th>שחקן</th><th>נצחונות</th><th>הפסדים</th><th>השפלה</th><th>% נצחון</th></tr>`;
            
            players.forEach(p => {
                html += `<tr>
                    <td><b>${p.name}</b></td>
                    <td>${p.wins}</td>
                    <td>${p.losses}</td>
                    <td style="color:red">${p.techLosses}</td>
                    <td>${p.winRate}%</td>
                </tr>`;
            });
            html += `</table>`;
            document.getElementById('content').innerHTML = html;
        }
        getData();
    </script>
</body>
</html>
